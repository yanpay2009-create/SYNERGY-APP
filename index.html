<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SYNERGY FLOW</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Kanit:wght@200;300;400;500;600;700&family=Sarabun:wght@100;200;300;400;500;600;700;800&family=Noto+Sans+Myanmar:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'Sarabun', 'Noto Sans Myanmar', 'sans-serif']
            },
            colors: {
              'synergy-blue': '#0EA5E9',
              'synergy-dark': '#0284C7',
              'apple-gray': '#F8FAFC',
              'glass': 'rgba(255, 255, 255, 0.8)',
              'glass-dark': 'rgba(15, 23, 42, 0.8)'
            },
            boxShadow: {
              'soft': '0 10px 40px rgba(0, 0, 0, 0.02)',
              'soft-dark': '0 10px 40px rgba(0, 0, 0, 0.3)',
              'glow': '0 0 15px rgba(14, 165, 233, 0.2)'
            },
            borderRadius: {
              'xl': '1.25rem',
              '2xl': '1.5rem',
              '3xl': '1.75rem'
            }
          }
        }
      }
    </script>
    <style>
      body {
        background-color: #f1f5f9; /* slate-100 */
        font-family: 'Inter', 'Sarabun', 'Noto Sans Myanmar', sans-serif;
        -webkit-font-smoothing: antialiased;
        transition: background-color 0.3s ease;
      }
      .dark body {
        background-color: #0f172a; /* slate-900 */
        color: #f8fafc;
      }
      /* Hide scrollbar for Chrome, Safari and Opera */
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      /* Hide scrollbar for IE, Edge and Firefox */
      .no-scrollbar {
        -ms-overflow-style: none;  /* IE and Edge */
        scrollbar-width: none;  /* Firefox */
      }
      
      /* Optimized Typography for different languages */
      :lang(th) {
        font-family: 'Inter', 'Sarabun', sans-serif !important;
        line-height: 1.6;
      }
      :lang(mm) {
        font-family: 'Inter', 'Sarabun', 'Noto Sans Myanmar', sans-serif !important;
        line-height: 1.8;
      }

      @keyframes shake {
        0%, 100% { transform: translateX(0); }
        25% { transform: translateX(-5px); }
        75% { transform: translateX(5px); }
      }
      .animate-shake {
        animation: shake 0.2s ease-in-out 0s 2;
      }

      @keyframes pulse-slow {
        0%, 100% { opacity: 0.3; transform: scale(1); }
        50% { opacity: 0.5; transform: scale(1.05); }
      }
      .animate-pulse-slow {
        animation: pulse-slow 8s ease-in-out infinite;
      }

      @keyframes sweep {
        0% { transform: translateX(-100%) skewX(-20deg); }
        50%, 100% { transform: translateX(200%) skewX(-20deg); }
      }
      .animate-sweep {
        animation: sweep 3s ease-in-out infinite;
      }

      .bg-grain {
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        filter: contrast(120%) brightness(100%);
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "recharts": "https://aistudiocdn.com/recharts@^3.5.1",
    "react-router-dom": "https://aistudiocdn.com/react-router-dom@^7.9.6",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",
    "lucide-react": "https://aistudiocdn.com/lucide-react@^0.555.0",
    "react/": "https://aistudiocdn.com/react@^19.2.0/",
    "react": "https://aistudiocdn.com/react@^19.2.0",
    "@google/genai": "https://aistudiocdn.com/@google/genai@^1.31.0",
    "html2canvas": "https://esm.sh/html2canvas@1.4.1"
  }
}
</script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
